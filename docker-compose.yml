services:
  registry:
    build:
      context: .
      dockerfile: agents/registry/Dockerfile
    ports:
      - "8099:8099"
    environment:
      - DB_PATH=/data/registry.db
    volumes:
      - registry_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/verifyiq.db
      - AGENT_REGISTRY_URL=${AGENT_REGISTRY_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_SYNTHESIS_MODEL=${OPENROUTER_SYNTHESIS_MODEL}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS}
    volumes:
      - sqlite_data:/data
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  equifax:
    build:
      context: .
      dockerfile: agents/equifax/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AGENT_REGISTRY_URL=${AGENT_REGISTRY_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_AGENT_MODEL=${OPENROUTER_AGENT_MODEL}
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  employment:
    build:
      context: .
      dockerfile: agents/employment/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - AGENT_REGISTRY_URL=${AGENT_REGISTRY_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_AGENT_MODEL=${OPENROUTER_AGENT_MODEL}
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  intl:
    build:
      context: .
      dockerfile: agents/intl/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - AGENT_REGISTRY_URL=${AGENT_REGISTRY_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_AGENT_MODEL=${OPENROUTER_AGENT_MODEL}
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  synthesis:
    build:
      context: .
      dockerfile: agents/synthesis/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - AGENT_REGISTRY_URL=${AGENT_REGISTRY_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_SYNTHESIS_MODEL=${OPENROUTER_SYNTHESIS_MODEL}
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
  registry_data:
